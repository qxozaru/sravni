{% extends 'main/base.html' %}
{% block title %}Вход{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="form-card reveal">
                <div class="text-center mb-4">
                    <div class="logo-icon mx-auto mb-3" style="width:52px;height:52px;border-radius:14px">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:28px;height:28px">
                            <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>
                        </svg>
                    </div>
                    <h2 style="font-weight:800;font-size:1.5rem">Вход в Сравни</h2>
                </div>
                {% if form.errors %}
                <div class="p-3 rounded-3 mb-3" style="background:var(--red-bg);color:var(--red);font-size:.88rem">
                    Неверное имя пользователя или пароль.
                </div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold" style="font-size:.85rem">Имя пользователя</label>
                        <input type="text" name="username" class="form-input" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold" style="font-size:.85rem">Пароль</label>
                        <input type="password" name="password" class="form-input" required>
                    </div>
                    <button type="submit" class="btn-brand w-100 mt-2" style="padding:.7rem">Войти</button>
                </form>
                <p class="text-center mt-3 mb-0 text-muted" style="font-size:.88rem">
                    Нет аккаунта? <a href="{% url 'register' %}" class="text-brand fw-bold text-decoration-none">Регистрация</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
